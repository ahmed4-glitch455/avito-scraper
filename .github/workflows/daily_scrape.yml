name: Avito Daily Scraper

on:
  schedule:
    # S'exécute tous les jours à 08:00 UTC (9:00 au Maroc)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permet de lancer le script manuellement pour tester

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v3

    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Exécuter le scraper
      env:
        # On injecte les secrets GitHub dans le script
        TELEGRAM_API: ${{ secrets.TELEGRAM_API }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scraper.py
      
